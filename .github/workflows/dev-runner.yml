# ================================================================
# dev-runner GitHub Actions Workflow
#
# このファイルを対象リポジトリの .github/workflows/dev-runner.yml
# にコピーして使用してください。
#
# 必要なシークレット（リポジトリ Settings > Secrets に設定）：
#   ANTHROPIC_API_KEY : Claude Code 実行用
#   DEV_RUNNER_CALLBACK_SECRET : Orchestrator認証用
#   ORCHESTRATOR_URL : Orchestrator公開URL（ngrok等）
#
# ブランチ保護設定（GitHub リポジトリ設定で必ず行うこと）：
#   - main ブランチへの直接 push を禁止
#   - PR必須・レビュー必須を設定
# ================================================================

name: dev-runner

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Orchestrator Run ID"
        required: true
        type: string
      branch_name:
        description: "作業ブランチ名 (例: dev-runner/20260303-120000/abc123)"
        required: true
        type: string
      goal:
        description: "開発目標"
        required: true
        type: string
      acceptance:
        description: "受け入れ条件"
        required: false
        type: string
        default: ""
      constraints:
        description: "制約事項"
        required: false
        type: string
        default: ""
      callback_secret:
        description: "Orchestratorコールバック認証シークレット"
        required: true
        type: string

# main への直接 push を禁止（PR のみ許可）
permissions:
  contents: write
  pull-requests: write

jobs:
  dev-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────
      # 2. 新ブランチ作成
      # ─────────────────────────────────────────
      - name: Create branch
        run: |
          git config user.name "dev-runner[bot]"
          git config user.email "dev-runner@insane.ai"
          git checkout -b "${{ inputs.branch_name }}"
          echo "BRANCH=${{ inputs.branch_name }}" >> $GITHUB_ENV

      # ─────────────────────────────────────────
      # 3. Node.js セットアップ（Claude Code用）
      # ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ─────────────────────────────────────────
      # 4. Claude Code インストール
      # ─────────────────────────────────────────
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # ─────────────────────────────────────────
      # 5. 実行プロンプト生成
      # ─────────────────────────────────────────
      - name: Prepare prompt
        id: prompt
        run: |
          GOAL="${{ inputs.goal }}"
          ACCEPTANCE="${{ inputs.acceptance }}"
          CONSTRAINTS="${{ inputs.constraints }}"
          RUN_ID="${{ inputs.run_id }}"

          PROMPT="あなたはdev-runner（おぷでぶ）です。以下のタスクを実装してください。

          Run ID: ${RUN_ID}
          目標: ${GOAL}
          受け入れ条件: ${ACCEPTANCE:-（未設定）}
          制約事項: ${CONSTRAINTS:-（なし）}

          実装ルール:
          - mainブランチへ直接pushしないこと
          - 現在のブランチ（${BRANCH}）のみで作業すること
          - 危険なコマンド（rm -rf /, git push --force, DROP TABLE等）は実行しないこと
          - 変更完了後、変更の概要を日本語で出力すること
          - テストが存在する場合は実行すること

          実装後、以下の形式でサマリを出力してください:
          --- SUMMARY START ---
          [5点以内で変更内容を記載]
          --- SUMMARY END ---"

          # 改行をエスケープしてGitHub Outputに保存
          echo "prompt<<PROMPT_EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "PROMPT_EOF" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # 6. Claude Code 実行
      # ─────────────────────────────────────────
      - name: Run Claude Code
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --output-format text "${{ steps.prompt.outputs.prompt }}" > claude_output.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          cat claude_output.txt
        continue-on-error: true

      # ─────────────────────────────────────────
      # 7. サマリ抽出
      # ─────────────────────────────────────────
      - name: Extract summary
        id: summary
        run: |
          if grep -q "--- SUMMARY START ---" claude_output.txt 2>/dev/null; then
            SUMMARY=$(sed -n '/--- SUMMARY START ---/,/--- SUMMARY END ---/p' claude_output.txt \
              | grep -v "--- SUMMARY" | head -10 | tr '\n' ' ')
          else
            SUMMARY="Claude Code 実行完了（サマリ未抽出）"
          fi
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # 8. テスト実行
      # ─────────────────────────────────────────
      - name: Run tests
        id: tests
        run: |
          TEST_RESULT="skipped"
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test --if-present 2>&1 | tee test_output.txt
            TEST_RESULT=$( [ ${PIPESTATUS[0]} -eq 0 ] && echo "passed" || echo "failed" )
          elif [ -f "pytest.ini" ] || [ -f "pyproject.toml" ] || find . -name "test_*.py" | head -1 | grep -q .; then
            pip install pytest -q 2>/dev/null || true
            python -m pytest --tb=short 2>&1 | tee test_output.txt
            TEST_RESULT=$( [ ${PIPESTATUS[0]} -eq 0 ] && echo "passed" || echo "failed" )
          fi
          echo "result=$TEST_RESULT" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ─────────────────────────────────────────
      # 9. コミット & プッシュ
      # ─────────────────────────────────────────
      - name: Commit and push
        id: commit
        run: |
          git add -A
          CHANGED=$(git status --porcelain | wc -l | tr -d ' ')
          if [ "$CHANGED" -eq "0" ]; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: ${{ inputs.goal }}

            Run ID: ${{ inputs.run_id }}
            Generated by dev-runner (おぷでぶ)"
            git push origin "${{ inputs.branch_name }}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────
      # 10. PR 作成
      # ─────────────────────────────────────────
      - name: Create PR
        id: pr
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY="${{ steps.summary.outputs.summary }}"
          TEST_RESULT="${{ steps.tests.outputs.result }}"
          GOAL="${{ inputs.goal }}"
          RUN_ID="${{ inputs.run_id }}"

          PR_BODY="## 開発概要
          ${GOAL}

          ## 変更サマリ
          ${SUMMARY}

          ## テスト結果
          ${TEST_RESULT}

          ---
          > 🤖 このPRは dev-runner（おぷでぶ）により自動生成されました
          > Run ID: \`${RUN_ID}\`
          > Generated by [Claude Code](https://claude.ai/code)"

          PR_URL=$(gh pr create \
            --title "feat: ${GOAL}" \
            --body "$PR_BODY" \
            --base main \
            --head "${{ inputs.branch_name }}" \
            --label "dev-runner" 2>&1 | tail -1)

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # 11. Orchestrator にコールバック
      # ─────────────────────────────────────────
      - name: Callback to Orchestrator
        if: always()
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
        run: |
          STATUS="success"
          ERROR_MSG=""

          # Claude Code が失敗した場合
          if [ "${{ steps.claude.outputs.exit_code }}" != "0" ]; then
            STATUS="failure"
            ERROR_MSG="Claude Code 実行失敗 (exit: ${{ steps.claude.outputs.exit_code }})"
          fi

          # 変更がなかった場合
          if [ "${{ steps.commit.outputs.has_changes }}" != "true" ]; then
            STATUS="failure"
            ERROR_MSG="${ERROR_MSG} / 変更なし（コードが生成されませんでした）"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "callback_secret": "${{ inputs.callback_secret }}",
            "run_id": "${{ inputs.run_id }}",
            "status": "${STATUS}",
            "pr_url": "${{ steps.pr.outputs.pr_url }}",
            "pr_number": "${{ steps.pr.outputs.pr_number }}",
            "summary": "${{ steps.summary.outputs.summary }}",
            "error": "${ERROR_MSG}",
            "actions_run_id": ${{ github.run_id }}
          }
          EOF
          )

          if [ -n "$ORCHESTRATOR_URL" ]; then
            curl -s -X POST "${ORCHESTRATOR_URL}/dev/callback" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || echo "Orchestratorへのコールバック失敗（続行）"
          else
            echo "ORCHESTRATOR_URL未設定: コールバックスキップ"
            echo "Payload: $PAYLOAD"
          fi
