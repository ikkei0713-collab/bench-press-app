# ================================================================
# dev-runner GitHub Actions Workflow
#
# このファイルを対象リポジトリの .github/workflows/dev-runner.yml
# にコピーして使用してください。
#
# 必要なシークレット（リポジトリ Settings > Secrets に設定）：
#   OPENAI_API_KEY : OpenAI API キー
#   DEV_RUNNER_CALLBACK_SECRET : Orchestrator認証用
#   ORCHESTRATOR_URL : Orchestrator公開URL（ngrok等、省略可）
#
# ブランチ保護設定（GitHub リポジトリ設定で必ず行うこと）：
#   - main ブランチへの直接 push を禁止
#   - PR必須・レビュー必須を設定
# ================================================================

name: dev-runner

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Orchestrator Run ID"
        required: true
        type: string
      branch_name:
        description: "作業ブランチ名"
        required: true
        type: string
      goal:
        description: "開発目標"
        required: true
        type: string
      acceptance:
        description: "受け入れ条件"
        required: false
        type: string
        default: ""
      constraints:
        description: "制約事項"
        required: false
        type: string
        default: ""
      callback_secret:
        description: "Orchestratorコールバック認証シークレット"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  dev-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 新ブランチ作成
      - name: Create branch
        run: |
          git config user.name "dev-runner[bot]"
          git config user.email "dev-runner@insane.ai"
          git checkout -b "${{ inputs.branch_name }}"
          echo "BRANCH=${{ inputs.branch_name }}" >> $GITHUB_ENV

      # 3. Python セットアップ
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install openai
        run: pip install openai -q

      # 4. リポジトリ構造を取得
      - name: Collect repo context
        id: context
        run: |
          echo "=== ファイル一覧 ===" > repo_context.txt
          find . -type f \
            ! -path './.git/*' \
            ! -path './node_modules/*' \
            ! -path './.next/*' \
            ! -path './dist/*' \
            ! -path './__pycache__/*' \
            ! -path './.venv/*' \
            ! -name '*.lock' \
            ! -name 'package-lock.json' \
            | sort >> repo_context.txt

          echo "" >> repo_context.txt
          echo "=== 主要ファイル内容 ===" >> repo_context.txt

          # 主要ファイルの内容を収集（合計上限 60KB）
          TOTAL=0
          for f in README.md package.json tsconfig.json pyproject.toml \
                   src/app/layout.tsx src/app/page.tsx \
                   $(find src -name '*.ts' -o -name '*.tsx' -o -name '*.py' 2>/dev/null | head -20); do
            if [ -f "$f" ] && [ "$TOTAL" -lt 60000 ]; then
              SIZE=$(wc -c < "$f")
              if [ "$SIZE" -lt 8000 ]; then
                echo "--- FILE: $f ---" >> repo_context.txt
                cat "$f" >> repo_context.txt
                echo "" >> repo_context.txt
                TOTAL=$((TOTAL + SIZE))
              fi
            fi
          done
          echo "Context collected: ${TOTAL} bytes"

      # 5. OpenAI で実装
      - name: Run dev-runner agent (OpenAI)
        id: agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'AGENTEOF'
          import os, json, subprocess
          from openai import OpenAI

          client = OpenAI()

          goal = os.environ.get("GOAL", "")
          acceptance = os.environ.get("ACCEPTANCE", "")
          constraints = os.environ.get("CONSTRAINTS", "")
          run_id = os.environ.get("RUN_ID", "")

          with open("repo_context.txt", "r") as f:
              context = f.read()

          system_prompt = """あなたは dev-runner（おぷでぶ）。GitHub Actions 上で動作するコード実装エージェントです。

          ルール:
          - main ブランチへ直接 push しない
          - rm -rf /, git push --force, DROP TABLE 等の危険コマンドは絶対禁止
          - 変更は JSON 形式で出力する（後続スクリプトがファイルに書き込む）

          出力フォーマット（必ず JSON のみ出力）:
          {
            "files": [
              {"path": "src/example.ts", "action": "write", "content": "ファイル内容全体"},
              {"path": "old-file.ts", "action": "delete"}
            ],
            "summary": "変更の要約（日本語、5点以内）"
          }

          action は "write"（作成/上書き）または "delete"（削除）のみ。
          content にはファイルの完全な内容を入れること（差分ではなく全文）。"""

          user_prompt = f"""以下のリポジトリに対して実装してください。

          ## 目標
          {goal}

          ## 受け入れ条件
          {acceptance or '（未設定）'}

          ## 制約
          {constraints or '（なし）'}

          ## リポジトリ構造と主要ファイル
          {context[:50000]}
          """

          print(f"Calling OpenAI API...")
          print(f"Goal: {goal}")

          try:
              resp = client.chat.completions.create(
                  model="gpt-4o",
                  messages=[
                      {"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_prompt},
                  ],
                  temperature=0.2,
                  max_tokens=16000,
                  response_format={"type": "json_object"},
              )

              raw = resp.choices[0].message.content
              print(f"Response received ({len(raw)} chars)")

              result = json.loads(raw)
              files = result.get("files", [])
              summary = result.get("summary", "変更なし")

              for f in files:
                  path = f["path"]
                  action = f.get("action", "write")
                  if action == "delete":
                      if os.path.exists(path):
                          os.remove(path)
                          print(f"Deleted: {path}")
                  else:
                      os.makedirs(os.path.dirname(path) if os.path.dirname(path) else ".", exist_ok=True)
                      with open(path, "w") as fh:
                          fh.write(f["content"])
                      print(f"Written: {path}")

              print(f"\n--- SUMMARY START ---")
              print(summary)
              print(f"--- SUMMARY END ---")

              with open("agent_summary.txt", "w") as sf:
                  sf.write(summary)

          except Exception as e:
              print(f"ERROR: {e}")
              with open("agent_summary.txt", "w") as sf:
                  sf.write(f"OpenAI API エラー: {e}")
              exit(1)
          AGENTEOF
        env:
          GOAL: ${{ inputs.goal }}
          ACCEPTANCE: ${{ inputs.acceptance }}
          CONSTRAINTS: ${{ inputs.constraints }}
          RUN_ID: ${{ inputs.run_id }}
        continue-on-error: true

      # 6. サマリ抽出
      - name: Extract summary
        id: summary
        run: |
          if [ -f agent_summary.txt ]; then
            SUMMARY=$(cat agent_summary.txt | head -10 | tr '\n' ' ')
          else
            SUMMARY="実行完了（サマリ未取得）"
          fi
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

      # 7. テスト実行
      - name: Run tests
        id: tests
        run: |
          TEST_RESULT="skipped"
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm install --legacy-peer-deps 2>/dev/null || true
            npm test --if-present 2>&1 | tee test_output.txt
            TEST_RESULT=$( [ ${PIPESTATUS[0]} -eq 0 ] && echo "passed" || echo "failed" )
          elif [ -f "pytest.ini" ] || [ -f "pyproject.toml" ] || find . -name "test_*.py" | head -1 | grep -q .; then
            pip install pytest -q 2>/dev/null || true
            python -m pytest --tb=short 2>&1 | tee test_output.txt
            TEST_RESULT=$( [ ${PIPESTATUS[0]} -eq 0 ] && echo "passed" || echo "failed" )
          fi
          echo "result=$TEST_RESULT" >> $GITHUB_OUTPUT
        continue-on-error: true

      # 8. コミット & プッシュ
      - name: Commit and push
        id: commit
        run: |
          git add -A
          CHANGED=$(git status --porcelain | wc -l | tr -d ' ')
          if [ "$CHANGED" -eq "0" ]; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: ${{ inputs.goal }}

            Run ID: ${{ inputs.run_id }}
            Generated by dev-runner (おぷでぶ) via OpenAI"
            git push origin "${{ inputs.branch_name }}"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # 9. PR 作成
      - name: Create PR
        id: pr
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY="${{ steps.summary.outputs.summary }}"
          TEST_RESULT="${{ steps.tests.outputs.result }}"
          GOAL="${{ inputs.goal }}"
          RUN_ID="${{ inputs.run_id }}"

          PR_URL=$(gh pr create \
            --title "feat: ${GOAL}" \
            --body "## 開発概要
          ${GOAL}

          ## 変更サマリ
          ${SUMMARY}

          ## テスト結果
          ${TEST_RESULT}

          ---
          > dev-runner (おぷでぶ) / OpenAI
          > Run ID: \`${RUN_ID}\`" \
            --base main \
            --head "${{ inputs.branch_name }}" \
            --label "dev-runner" 2>&1 | tail -1)

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      # 10. Orchestrator にコールバック
      - name: Callback to Orchestrator
        if: always()
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
        run: |
          STATUS="success"
          ERROR_MSG=""

          if [ "${{ steps.agent.outcome }}" != "success" ]; then
            STATUS="failure"
            ERROR_MSG="OpenAI agent 実行失敗"
          fi

          if [ "${{ steps.commit.outputs.has_changes }}" != "true" ]; then
            STATUS="failure"
            ERROR_MSG="${ERROR_MSG} / 変更なし"
          fi

          PAYLOAD=$(jq -n \
            --arg secret "${{ inputs.callback_secret }}" \
            --arg run_id "${{ inputs.run_id }}" \
            --arg status "$STATUS" \
            --arg pr_url "${{ steps.pr.outputs.pr_url }}" \
            --arg pr_number "${{ steps.pr.outputs.pr_number }}" \
            --arg summary "${{ steps.summary.outputs.summary }}" \
            --arg error "$ERROR_MSG" \
            --argjson actions_run_id ${{ github.run_id }} \
            '{callback_secret:$secret,run_id:$run_id,status:$status,pr_url:$pr_url,pr_number:$pr_number,summary:$summary,error:$error,actions_run_id:$actions_run_id}')

          if [ -n "$ORCHESTRATOR_URL" ]; then
            curl -s -X POST "${ORCHESTRATOR_URL}/dev/callback" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || echo "コールバック失敗（続行）"
          else
            echo "ORCHESTRATOR_URL未設定: コールバックスキップ"
          fi
